# Production Environment Configuration

# Database Configuration (MS SQL Server - Production)
# Override these via environment variables in docker-compose or Kubernetes
spring.datasource.url=${DB_URL:jdbc:sqlserver://db:1433;databaseName=AppraisalDB;encrypt=true;trustServerCertificate=true}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:YourStrong@Passw0rd}

# JPA Configuration - Production
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Session Configuration - Production
server.servlet.session.timeout=15m
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

# Mail Configuration - Production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@thinknsolutions.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging - Production
logging.level.com.tns.appraisal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# PDF Storage Path - Production
appraisal.pdf.storage.path=${PDF_STORAGE_PATH:/app/appraisal-pdfs}

# Flyway Configuration - Production
spring.flyway.enabled=false

# Server Configuration
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
